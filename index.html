<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Life Sim</title>
    <link rel="stylesheet" href="/src/styles.css?v=20260318-3" />
  </head>
  <body>
    <div id="app"></div>
    <script type="module">
      const root = document.getElementById('app');
      const renderLoaderError = (error) => {
        if (!root) return;
        root.innerHTML = `
          <div style="min-height:100vh;display:grid;place-items:center;padding:24px;background:#0b0e16;color:#f3f7ff;font-family:Inter,system-ui,sans-serif;">
            <div style="max-width:760px;padding:24px;border:1px solid rgba(255,255,255,0.12);border-radius:24px;background:#151926;">
              <p style="margin:0 0 8px;color:#9db0ff;text-transform:uppercase;letter-spacing:.14em;font-size:12px;">Life Sim</p>
              <h1 style="margin:0 0 12px;font-size:28px;">Ошибка загрузки клиента</h1>
              <p style="margin:0 0 12px;color:#cfd8ec;line-height:1.6;">Фронтенд-модуль не смог загрузиться. Обнови страницу без кэша. Если проблема повторяется — значит браузер получил старый или битый JS-файл.</p>
              <pre style="margin:0;white-space:pre-wrap;color:#ffb4c1;">${String(error?.message || error)}</pre>
            </div>
          </div>
        `;
      };

      import('/src/main.js?v=20260318-3').catch((error) => {
        console.error(error);
        renderLoaderError(error);
      });
    </script>
  </body>
</html>
